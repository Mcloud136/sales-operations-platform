# /etc/nginx/conf.d/sales-ops.conf
# Nginx configuration for Sales Operations Platform
# - UDS upstream to Uvicorn (zero TCP overhead per Iron Rule 6)
# - Static file serving from frontend-dist
# - Gzip, CORS, and security headers

upstream django_backend {
    server unix:/var/run/sales-ops/app.sock;
}

server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- CORS Headers (frontend origin) ---
    # Add your frontend domain here in production
    add_header Access-Control-Allow-Origin "https://your-frontend-domain.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 3600 always;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # --- Client Body Limits ---
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # --- Static Files (Frontend SPA) ---
    root /opt/sales-ops/frontend-dist;

    # Serve frontend static assets with aggressive caching
    location /assets/ {
        alias /opt/sales-ops/frontend-dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Django collected static files (admin, etc.)
    location /static/ {
        alias /opt/sales-ops/current/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # Django media files (uploads)
    location /media/ {
        alias /opt/sales-ops/current/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        application/ld+json
        image/svg+xml;

    # --- API Reverse Proxy (UDS to Uvicorn) ---
    location /api/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }

    # --- Django Admin ---
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA Fallback: Serve index.html for all non-file, non-API routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Logging ---
    access_log /var/log/nginx/sales-ops-access.log combined;
    error_log /var/log/nginx/sales-ops-error.log warn;

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ /(\.env|\.git|\.hg|\.svn) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
